aid: membrane
name: Membrane
description: >-
  Membrane is an AI-powered platform for building product integrations using
  natural language. It connects to any API with 282+ pre-built packages and
  is compatible with AI coding assistants via MCP. There is also a separate
  open source Membrane API Gateway for REST, SOAP, and GraphQL.
